<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زەخرەفەی ناوەکەت</title>
    <style>
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #1a73e8;
        }
        .input-container {
            margin-bottom: 30px;
        }
        input[type="text"] {
            width: 80%;
            max-width: 400px;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #1a73e8;
        }
        .results-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .result-box {
            background-color: #fff;
            padding: 15px;
            width: 90%;
            max-width: 500px;
            font-size: 22px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .result-box:hover {
            transform: scale(1.02);
            background-color: #e8f0fe;
        }
        .hint {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>زەخرەفەی ناوەکەت بکە</h1>
    <div class="input-container">
        <input type="text" id="nameInput" placeholder="ناوەکەت لێرە بنووسە..." oninput="generateDecorations()">
        <p class="hint">تێبینی: کرتە لە هەر ناوێک بکە بۆ ئەوەی ڕاستەوخۆ کۆپی ببێت.</p>
    </div>

    <div class="results-container" id="results">
        </div>

    <script>
        function generateDecorations() {
            const name = document.getElementById('nameInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            // سڕینەوەی ئەنجامە کۆنەکان
            resultsDiv.innerHTML = '';

            if (name === '') {
                return; // ئەگەر هیچ نەنووسرابوو، هیچ مەکە
            }

            // دروستکردنی شێوازی پیت درێژکردنەوە (وەک: نـاو)
            const stretchedName = name.split('').join('ـ');

            // لێرەدا دەتوانیت تا ١٠٠ شێواز و هێمای جیاواز بنووسیت
            const styles = [
                `꧁ ${name} ꧂`,
                `★·.·´¯\`·.·★ ${name} ★·.·´¯\`·.·★`,
                `【 ${name} 】`,
                `«-(¯\`v´¯)-« ${name} »-(¯\`v´¯)-»`,
                `ıllıllı ${name} ıllıllı`,
                `✿.｡.:* ☆:**:. ${name} .:**:.☆*.:｡.✿`,
                `♔〘 ${name} 〙♔`,
                `▓▒░ ${name} ░▒▓`,
                `⫷ ${name} ⫸`,
                `╰☆☆ ${name} ☆☆╮`,
                `۞ ${name} ۞`,
                `༺ ${name} ༻`,
                stretchedName, // شێوازی درێژکراوە
                `꧁ ${stretchedName} ꧂`,
                `๑۞๑,¸¸,ø¤º°\`°๑۩ ${name} ๑۩ ,¸¸,ø¤º°\`°๑۞๑`
            ];

            // نیشاندانی شێوازەکان لە ناو وێبسایتەکە
            styles.forEach(style => {
                const box = document.createElement('div');
                box.className = 'result-box';
                box.innerText = style;
                
                // تایبەتمەندی کۆپیکردن کاتێک کلیکی لێ دەکرێت
                box.onclick = function() {
                    navigator.clipboard.writeText(style);
                    
                    // گۆڕینی ڕەنگ بۆ ماوەیەکی کورت بۆ ئەوەی بزانێت کۆپی بووە
                    const originalBg = this.style.backgroundColor;
                    this.style.backgroundColor = '#cce5ff';
                    this.innerText = 'کۆپی کرا! ✔';
                    setTimeout(() => {
                        this.style.backgroundColor = originalBg;
                        this.innerText = style;
                    }, 1000);
                };
                
                resultsDiv.appendChild(box);
            });
        }
    </script>

</body>
</html>
